<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sistema de Seguimiento de Proyectos</title>

    <!-- Tailwind (prototipo) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 + ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para JSX (prototipo) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide (no React) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>

  <body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const STORAGE_KEY = "project_tracking_v3_fx";

      const uid = () =>
        (typeof crypto !== "undefined" && crypto.randomUUID)
          ? crypto.randomUUID()
          : String(Date.now() + Math.random());

      const toNum = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? n : 0;
      };

      function Icon({ name, size = 20, className = "" }) {
        return (
          <i
            data-lucide={name}
            className={className}
            style={{ width: size, height: size }}
          ></i>
        );
      }

      function Toast({ toast, onClose }) {
        useEffect(() => {
          if (!toast) return;
          const t = setTimeout(onClose, 2800);
          return () => clearTimeout(t);
        }, [toast, onClose]);

        if (!toast) return null;

        return (
          <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-[60]">
            <div
              className={`px-4 py-3 rounded-lg shadow-lg text-sm font-semibold ${
                toast.type === "error"
                  ? "bg-red-600 text-white"
                  : "bg-gray-900 text-white"
              }`}
            >
              {toast.message}
            </div>
          </div>
        );
      }

      function Badge({ children, tone = "gray" }) {
        const map = {
          gray: "bg-gray-100 text-gray-800",
          green: "bg-green-100 text-green-800",
          red: "bg-red-100 text-red-800",
          yellow: "bg-yellow-100 text-yellow-800",
          blue: "bg-blue-100 text-blue-800",
          purple: "bg-purple-100 text-purple-800",
        };
        return (
          <span className={`px-2 py-1 rounded-full text-xs font-semibold ${map[tone] || map.gray}`}>
            {children}
          </span>
        );
      }

      function App() {
        const [activeTab, setActiveTab] = useState("proyectos");
        const [userRole, setUserRole] = useState("admin");

        const [state, setState] = useState(() => {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw
              ? JSON.parse(raw)
              : {
                  proyectos: [],
                  consultores: [],
                  horas: [],
                  gastos: [],
                  proyecciones: [],
                  fx: { monedaA: "USD", monedaB: "COP", trm: "4000" }, // A -> B
                };
          } catch {
            return {
              proyectos: [],
              consultores: [],
              horas: [],
              gastos: [],
              proyecciones: [],
              fx: { monedaA: "USD", monedaB: "COP", trm: "4000" },
            };
          }
        });

        const { proyectos, consultores, horas, gastos, proyecciones, fx } = state;

        const [showModal, setShowModal] = useState(false);
        const [modalType, setModalType] = useState("");
        const [editingId, setEditingId] = useState(null);
        const [formData, setFormData] = useState({});
        const [toast, setToast] = useState(null);

        const [statsFilters, setStatsFilters] = useState({
          empresa: "",
          proyectoId: "",
          desde: "",
          hasta: "",
        });

        const monedas = ["USD", "EUR", "COP", "MXN", "ARS", "CLP", "PEN"];
        const catalogoGastos = [
          "Viajes",
          "Alimentación",
          "Transporte",
          "Viáticos",
          "Hospedaje",
          "Material",
          "Consultoría",
          "Otro",
        ];
        const roles = [
          "Developer",
          "Senior Developer",
          "Tech Lead",
          "Project Manager",
          "QA Engineer",
          "Designer",
          "DevOps",
          "Arquitecto",
        ];

        useEffect(() => {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }, [state]);

        useEffect(() => {
          if (window.lucide) window.lucide.createIcons();
        });

        const notify = (message, type = "ok") => setToast({ message, type });

        const getProyecto = (id) => proyectos.find((p) => p.id === id) || null;
        const getProyectoName = (id) => getProyecto(id)?.nombre ?? "—";
        const getProyectoEmpresa = (id) => getProyecto(id)?.empresa ?? "—";
        const getProyectoMoneda = (id) => getProyecto(id)?.moneda ?? "";

        // ---------------- FX (DOBLE MONEDA CON TRM) ----------------
        const fxRate = Math.max(0, toNum(fx?.trm || 0)); // A -> B

        const formatMoney = (amount) => toNum(amount).toLocaleString();

        // Devuelve: { aText, bText, note } con conversión basada en TRM A->B
        const dualMoney = (amount, monedaOriginal) => {
          const a = fx?.monedaA || "USD";
          const b = fx?.monedaB || "COP";
          const amt = toNum(amount);

          // Si no hay TRM, solo muestra original
          if (!fxRate || fxRate <= 0) {
            return {
              primary: `${monedaOriginal} ${formatMoney(amt)}`,
              secondary: "TRM no definida",
              secondaryMuted: true,
            };
          }

          // Si original es A, convierto a B
          if (monedaOriginal === a) {
            const conv = amt * fxRate;
            return {
              primary: `${a} ${formatMoney(amt)}`,
              secondary: `${b} ${formatMoney(conv)}`,
              secondaryMuted: false,
            };
          }

          // Si original es B, convierto a A
          if (monedaOriginal === b) {
            const conv = amt / fxRate;
            return {
              primary: `${b} ${formatMoney(amt)}`,
              secondary: `${a} ${formatMoney(conv)}`,
              secondaryMuted: false,
            };
          }

          // Si original es otra, muestro original y aviso
          return {
            primary: `${monedaOriginal} ${formatMoney(amt)}`,
            secondary: `No convertible (${a}↔${b})`,
            secondaryMuted: true,
          };
        };

        const MoneyDual = ({ amount, currency, className = "" }) => {
          const d = dualMoney(amount, currency);
          return (
            <div className={`leading-tight ${className}`}>
              <div className="font-semibold">{d.primary}</div>
              <div className={`text-xs ${d.secondaryMuted ? "text-gray-400" : "text-gray-600"}`}>
                {d.secondary}
              </div>
            </div>
          );
        };

        // ---------------- METRICAS DERIVADAS ----------------
        const proyectoStats = useMemo(() => {
          const stats = new Map();
          for (const p of proyectos) stats.set(p.id, { horasAprobadas: 0, gastoTotal: 0 });
          for (const h of horas) {
            if (h.estado === "Aprobado" && stats.has(h.proyectoId)) {
              stats.get(h.proyectoId).horasAprobadas += toNum(h.horas);
            }
          }
          for (const g of gastos) {
            if (stats.has(g.proyectoId)) {
              stats.get(g.proyectoId).gastoTotal += toNum(g.valor);
            }
          }
          return stats;
        }, [proyectos, horas, gastos]);

        const calcularPresupuestoDisponible = (proyecto) => {
          const presupuesto = toNum(proyecto.presupuesto);
          const usado = proyectoStats.get(proyecto.id)?.gastoTotal ?? 0;
          return presupuesto - usado;
        };

        const calcularPorcentajeUsado = (proyecto) => {
          const presupuesto = toNum(proyecto.presupuesto);
          const usado = proyectoStats.get(proyecto.id)?.gastoTotal ?? 0;
          return presupuesto > 0 ? ((usado / presupuesto) * 100).toFixed(1) : "0.0";
        };

        // ---------------- FECHAS ----------------
        const isWithinRange = (dateStr, desde, hasta) => {
          if (!dateStr) return false;
          if (desde && dateStr < desde) return false;
          if (hasta && dateStr > hasta) return false;
          return true;
        };

        // ---------------- CRUD ----------------
        const openModal = (type, item = null) => {
          setModalType(type);
          setEditingId(item?.id ?? null);
          if (item) setFormData({ ...item });
          else {
            if (type === "proyecto") setFormData({ moneda: "USD" });
            else setFormData({});
          }
          setShowModal(true);
        };

        const closeModal = () => {
          setShowModal(false);
          setModalType("");
          setEditingId(null);
          setFormData({});
        };

        const upsertProyecto = (data, id) => {
          if (!data.nombre?.trim()) throw new Error("Nombre de proyecto requerido.");
          if (!data.empresa?.trim()) throw new Error("Empresa requerida.");
          if (!data.pais?.trim()) throw new Error("País requerido.");
          if (!data.moneda) throw new Error("Selecciona moneda.");
          if (toNum(data.presupuesto) < 0) throw new Error("Presupuesto no puede ser negativo.");
          if (!data.fechaInicio) throw new Error("Fecha inicio requerida.");
          if (!data.fechaFin) throw new Error("Fecha fin requerida.");
          if (data.fechaFin < data.fechaInicio) throw new Error("La fecha fin no puede ser menor que la fecha inicio.");

          setState((s) => {
            if (id) {
              return {
                ...s,
                proyectos: s.proyectos.map((p) => (p.id === id ? { ...p, ...data, id } : p)),
              };
            }
            return { ...s, proyectos: [...s.proyectos, { ...data, id: uid() }] };
          });
        };

        const upsertConsultor = (data, id) => {
          if (!data.nombre?.trim()) throw new Error("Nombre requerido.");
          if (!data.identificacion?.trim()) throw new Error("Identificación requerida.");
          if (!data.correo?.trim()) throw new Error("Correo requerido.");
          if (!data.rol) throw new Error("Selecciona un rol.");

          setState((s) => {
            if (id) {
              return {
                ...s,
                consultores: s.consultores.map((c) => (c.id === id ? { ...c, ...data, id } : c)),
              };
            }
            return { ...s, consultores: [...s.consultores, { ...data, id: uid() }] };
          });
        };

        const addHoras = (data) => {
          if (!proyectos.length) throw new Error("Crea un proyecto antes de registrar horas.");
          if (!data.consultor?.trim()) throw new Error("Nombre del consultor requerido.");
          if (!data.proyectoId) throw new Error("Selecciona un proyecto.");
          if (!data.rol) throw new Error("Selecciona un rol.");
          if (!data.tarea?.trim()) throw new Error("Describe la tarea.");
          if (toNum(data.horas) <= 0) throw new Error("Horas debe ser mayor a 0.");

          setState((s) => ({
            ...s,
            horas: [
              ...s.horas,
              { id: uid(), ...data, fecha: new Date().toISOString().slice(0, 10), estado: "Pendiente" },
            ],
          }));
        };

        const upsertGasto = (data, id) => {
          if (!proyectos.length) throw new Error("Crea un proyecto antes de registrar gastos.");
          if (!data.proyectoId) throw new Error("Selecciona un proyecto.");
          if (!data.tipoGasto) throw new Error("Selecciona tipo de gasto.");
          if (!data.descripcion?.trim()) throw new Error("Descripción requerida.");
          if (toNum(data.valor) <= 0) throw new Error("Valor debe ser mayor a 0.");
          if (!data.esVariable) throw new Error("Selecciona clasificación.");

          setState((s) => {
            if (id) {
              return { ...s, gastos: s.gastos.map((g) => (g.id === id ? { ...g, ...data, id } : g)) };
            }
            return { ...s, gastos: [...s.gastos, { id: uid(), ...data }] };
          });
        };

        const upsertProyeccion = (data, id) => {
          if (!data.proyectoId) throw new Error("Selecciona un proyecto.");
          if (!data.consultor?.trim()) throw new Error("Nombre del consultor requerido.");
          if (!data.rol) throw new Error("Selecciona un rol.");
          if (toNum(data.horasProyectadas) <= 0) throw new Error("Horas proyectadas debe ser > 0.");
          if (!data.fechaInicio) throw new Error("Fecha inicio requerida.");
          if (!data.fechaFin) throw new Error("Fecha fin requerida.");
          if (data.fechaFin < data.fechaInicio) throw new Error("La fecha fin no puede ser menor que la fecha inicio.");
          if (data.tarifaHora && toNum(data.tarifaHora) < 0) throw new Error("Tarifa hora no puede ser negativa.");

          setState((s) => {
            if (id) return { ...s, proyecciones: s.proyecciones.map((x) => (x.id === id ? { ...x, ...data, id } : x)) };
            return { ...s, proyecciones: [...s.proyecciones, { id: uid(), ...data }] };
          });
        };

        const aprobarHoras = (id) => {
          setState((s) => ({
            ...s,
            horas: s.horas.map((h) => (h.id === id ? { ...h, estado: "Aprobado" } : h)),
          }));
        };

        const rechazarHoras = (id) => {
          setState((s) => ({
            ...s,
            horas: s.horas.map((h) => (h.id === id ? { ...h, estado: "Rechazado" } : h)),
          }));
        };

        const deleteItem = (type, id) => {
          setState((s) => {
            if (type === "proyecto") {
              return {
                ...s,
                proyectos: s.proyectos.filter((p) => p.id !== id),
                horas: s.horas.filter((h) => h.proyectoId !== id),
                gastos: s.gastos.filter((g) => g.proyectoId !== id),
                proyecciones: s.proyecciones.filter((x) => x.proyectoId !== id),
              };
            }
            if (type === "consultor") return { ...s, consultores: s.consultores.filter((c) => c.id !== id) };
            if (type === "horas") return { ...s, horas: s.horas.filter((h) => h.id !== id) };
            if (type === "gasto") return { ...s, gastos: s.gastos.filter((g) => g.id !== id) };
            if (type === "proyeccion") return { ...s, proyecciones: s.proyecciones.filter((x) => x.id !== id) };
            return s;
          });
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          try {
            if (modalType === "proyecto") {
              upsertProyecto(formData, editingId);
              notify(editingId ? "Proyecto actualizado." : "Proyecto creado.");
            } else if (modalType === "consultor") {
              upsertConsultor(formData, editingId);
              notify(editingId ? "Consultor actualizado." : "Consultor creado.");
            } else if (modalType === "horas") {
              addHoras(formData);
              notify("Horas registradas (Pendiente).");
            } else if (modalType === "gasto") {
              upsertGasto(formData, editingId);
              notify(editingId ? "Gasto actualizado." : "Gasto registrado.");
            } else if (modalType === "proyeccion") {
              upsertProyeccion(formData, editingId);
              notify(editingId ? "Proyección actualizada." : "Proyección creada.");
            }
            closeModal();
          } catch (err) {
            notify(err.message || "Error", "error");
          }
        };

        // ---------------- ESTADÍSTICAS ----------------
        const empresas = useMemo(() => {
          const set = new Set(proyectos.map((p) => p.empresa).filter(Boolean));
          return Array.from(set).sort();
        }, [proyectos]);

        const proyectosFiltrables = useMemo(() => {
          if (!statsFilters.empresa) return proyectos;
          return proyectos.filter((p) => p.empresa === statsFilters.empresa);
        }, [proyectos, statsFilters.empresa]);

        const horasFiltradas = useMemo(() => {
          return horas.filter((h) => {
            const p = getProyecto(h.proyectoId);
            if (!p) return false;
            if (statsFilters.empresa && p.empresa !== statsFilters.empresa) return false;
            if (statsFilters.proyectoId && h.proyectoId !== statsFilters.proyectoId) return false;
            if (statsFilters.desde || statsFilters.hasta) {
              return isWithinRange(h.fecha, statsFilters.desde, statsFilters.hasta);
            }
            return true;
          });
        }, [horas, statsFilters, proyectos]);

        const horasAprobadasFiltradas = useMemo(
          () => horasFiltradas.filter((h) => h.estado === "Aprobado"),
          [horasFiltradas]
        );

        const gastosFiltrados = useMemo(() => {
          return gastos.filter((g) => {
            const p = getProyecto(g.proyectoId);
            if (!p) return false;
            if (statsFilters.empresa && p.empresa !== statsFilters.empresa) return false;
            if (statsFilters.proyectoId && g.proyectoId !== statsFilters.proyectoId) return false;
            return true;
          });
        }, [gastos, statsFilters, proyectos]);

        const proyeccionesFiltradas = useMemo(() => {
          return proyecciones.filter((x) => {
            const p = getProyecto(x.proyectoId);
            if (!p) return false;
            if (statsFilters.empresa && p.empresa !== statsFilters.empresa) return false;
            if (statsFilters.proyectoId && x.proyectoId !== statsFilters.proyectoId) return false;

            if (statsFilters.desde || statsFilters.hasta) {
              const desde = statsFilters.desde || "0000-01-01";
              const hasta = statsFilters.hasta || "9999-12-31";
              return !(x.fechaFin < desde || x.fechaInicio > hasta);
            }
            return true;
          });
        }, [proyecciones, statsFilters, proyectos]);

        const horasPorConsultor = useMemo(() => {
          const map = new Map();
          for (const h of horasAprobadasFiltradas) {
            const key = (h.consultor || "—").trim();
            if (!map.has(key)) map.set(key, { total: 0, proyectos: new Map() });
            const node = map.get(key);
            const hrs = toNum(h.horas);
            node.total += hrs;
            node.proyectos.set(h.proyectoId, (node.proyectos.get(h.proyectoId) || 0) + hrs);
          }
          const rows = Array.from(map.entries()).map(([consultor, v]) => ({
            consultor,
            total: v.total,
            byProject: v.proyectos,
          }));
          rows.sort((a, b) => b.total - a.total);
          return rows;
        }, [horasAprobadasFiltradas]);

        const resumenPorProyecto = useMemo(() => {
          const list = [];
          for (const p of proyectosFiltrables) {
            if (statsFilters.proyectoId && p.id !== statsFilters.proyectoId) continue;

            const used = proyectoStats.get(p.id)?.gastoTotal ?? 0;
            const budget = toNum(p.presupuesto);
            const available = budget - used;

            // Proyección: horasProyectadas * tarifaHora (si está)
            const projItems = proyeccionesFiltradas.filter((x) => x.proyectoId === p.id);
            const projectedCost = projItems.reduce(
              (acc, x) => acc + toNum(x.horasProyectadas) * toNum(x.tarifaHora),
              0
            );

            const projectedTotal = used + projectedCost;
            const projectedPct = budget > 0 ? (projectedTotal / budget) * 100 : 0;

            list.push({
              proyecto: p,
              usado: used,
              presupuesto: budget,
              disponible: available,
              projectedCost,
              projectedTotal,
              projectedPct,
              hasProjectionPricing: projectedCost > 0,
            });
          }
          list.sort((a, b) => b.projectedPct - a.projectedPct);
          return list;
        }, [proyectosFiltrables, statsFilters.proyectoId, proyectoStats, proyeccionesFiltradas]);

        const proyeccionHorasPorConsultor = useMemo(() => {
          const map = new Map();
          for (const x of proyeccionesFiltradas) {
            const name = (x.consultor || "—").trim();
            if (!map.has(name)) map.set(name, { totalHoras: 0, items: [] });
            const node = map.get(name);
            const hrs = toNum(x.horasProyectadas);
            node.totalHoras += hrs;
            node.items.push(x);
          }
          const rows = Array.from(map.entries()).map(([consultor, v]) => ({
            consultor,
            totalHoras: v.totalHoras,
            items: v.items.sort((a, b) => (a.fechaInicio || "").localeCompare(b.fechaInicio || "")),
          }));
          rows.sort((a, b) => b.totalHoras - a.totalHoras);
          return rows;
        }, [proyeccionesFiltradas]);

        return (
          <div className="min-h-screen bg-gray-50">
            {/* Header */}
            <div className="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
              <div className="max-w-7xl mx-auto px-4 py-6">
                <h1 className="text-3xl font-bold flex items-center gap-3">
                  <Icon name="file-text" size={34} className="text-white" />
                  Sistema de Seguimiento de Proyectos
                </h1>
                <p className="mt-2 text-blue-100">
                  Ahora con doble moneda: porque una sola ya no alcanza para sufrir.
                </p>
              </div>
            </div>

            {/* Barra superior: rol + FX */}
            <div className="max-w-7xl mx-auto px-4 py-4 bg-white border-b">
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 items-start">
                <div className="flex items-center gap-4">
                  <label className="font-semibold text-gray-700">Vista actual:</label>
                  <select
                    value={userRole}
                    onChange={(e) => setUserRole(e.target.value)}
                    className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                  >
                    <option value="colaborador">Colaborador</option>
                    <option value="lider">Líder de Área</option>
                    <option value="admin">Administrador</option>
                  </select>
                </div>

                {/* FX Controls */}
                <div className="bg-gray-50 border border-gray-200 rounded-lg p-3">
                  <div className="flex items-center gap-2 mb-2">
                    <Icon name="repeat" size={16} />
                    <span className="text-sm font-semibold text-gray-800">Doble moneda (TRM)</span>
                    <span className="text-xs text-gray-500">A → B</span>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                    <div>
                      <label className="block text-xs font-semibold text-gray-700 mb-1">Moneda A</label>
                      <select
                        value={fx.monedaA}
                        onChange={(e) =>
                          setState((s) => ({ ...s, fx: { ...s.fx, monedaA: e.target.value } }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                      >
                        {monedas.map((m) => (
                          <option key={m} value={m}>
                            {m}
                          </option>
                        ))}
                      </select>
                    </div>

                    <div>
                      <label className="block text-xs font-semibold text-gray-700 mb-1">Moneda B</label>
                      <select
                        value={fx.monedaB}
                        onChange={(e) =>
                          setState((s) => ({ ...s, fx: { ...s.fx, monedaB: e.target.value } }))
                        }
                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-sm"
                      >
                        {monedas.map((m) => (
                          <option key={m} value={m}>
                            {m}
                          </option>

                            </select>
                          </div>

                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">Consultor</label>
                              <input
                                type="text"
                                required
                                value={formData.consultor || ""}
                                onChange={(e) => setFormData({ ...formData, consultor: e.target.value })}
                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                placeholder="Nombre (texto)"
                              />
                            </div>

                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">Rol</label>
                              <select
                                required
                                value={formData.rol || ""}
                                onChange={(e) => setFormData({ ...formData, rol: e.target.value })}
                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              >
                                <option value="">Seleccionar rol</option>
                                {roles.map((r) => (
                                  <option key={r} value={r}>{r}</option>
                                ))}
                              </select>
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">Fecha Inicio</label>
                              <input
                                type="date"
                                required
                                value={formData.fechaInicio || ""}
                                onChange={(e) => setFormData({ ...formData, fechaInicio: e.target.value })}
                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              />
                            </div>

                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">Fecha Fin</label>
                              <input
                                type="date"
                                required
                                value={formData.fechaFin || ""}
                                onChange={(e) => setFormData({ ...formData, fechaFin: e.target.value })}
                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              />
                            </div>
                          </div>

                          <div className="grid grid-cols-2 gap-4">
                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">Horas Proyectadas</label>
                              <input
                                type="number"
                                required
                                step="0.5"
                                min="0"
                                value={formData.horasProyectadas || ""}
                                onChange={(e) => setFormData({ ...formData, horasProyectadas: e.target.value })}
                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                              />
                            </div>

                            <div>
                              <label className="block text-sm font-semibold text-gray-700 mb-1">
                                Tarifa por hora (opcional)
                              </label>
                              <input
                                type="number"
                                step="0.01"
                                min="0"
                                value={formData.tarifaHora || ""}
                                onChange={(e) => setFormData({ ...formData, tarifaHora: e.target.value })}
                                className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                placeholder="En moneda del proyecto"
                              />
                              <p className="text-xs text-gray-500 mt-1">
                                Si está en {fx.monedaA} o {fx.monedaB}, se verá en doble moneda con tu TRM.
                              </p>
                            </div>
                          </div>
                        </>
                      )}

                      <div className="flex gap-3 pt-4">
                        <button
                          type="submit"
                          className="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-700 transition-colors"
                        >
                          <Icon name="save" size={18} />
                          {editingId ? "Actualizar" : "Guardar"}
                        </button>

                        <button
                          type="button"
                          onClick={closeModal}
                          className="flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-300 transition-colors"
                        >
                          Cancelar
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            )}

            <Toast toast={toast} onClose={() => setToast(null)} />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
